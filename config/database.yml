default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>

development:
  <<: *default
  database: tcc_cesep1_development

test:
  <<: *default
  database: tcc_cesep1_test

production:
  primary: &primary_production
    <<: *default
    database: tcc_cesep1_production
    username: tcc_cesep1
    password: <%= ENV["TCC_CESEP1_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: tcc_cesep1_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: tcc_cesep1_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: tcc_cesep1_production_cable
    migrations_paths: db/cable_migrate
